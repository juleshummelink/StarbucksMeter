<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StarbucksMeter – Ijskoffie Prijsvergelijker</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-logo">
        <img src="/recourses/starbucks.png" class="starbucks-logo" alt="Starbucks" />
        <div>
          <h1>StarbucksMeter</h1>
          <p class="subtitle">Ijskoffie prijsvergelijker</p>
        </div>
      </div>
      <div class="header-actions">
        <span id="last-updated" class="last-updated"></span>
        <button id="refresh-btn" class="btn-refresh" onclick="loadPrices(true)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
          </svg>
          <span class="btn-label">Vernieuwen</span>
        </button>
      </div>
    </div>
  </header>

  <main>
    <div id="state-empty" class="state-card">
      <p>Klik op <strong>Vernieuwen</strong> om de actuele prijzen op te halen.</p>
    </div>

    <div id="state-loading" class="state-card loading-card hidden">
      <!-- Fading store display -->
      <div id="scrape-store-display" class="scrape-store-display">
        <img id="scrape-store-logo" class="scrape-store-logo" src="" alt="" />
        <p id="scrape-store-text" class="scrape-store-text">Prijzen ophalen…</p>
      </div>

      <!-- Progress bar -->
      <div class="progress-track">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
      <p id="progress-label" class="progress-label">0 / 12 producten</p>

      <!-- Store indicators row -->
      <div class="store-indicators">
        <div class="store-dot" id="dot-Dirk"  data-store="Dirk">
          <img src="/recourses/stores/dirk.png"  alt="Dirk" />
          <span class="dot-check">✓</span>
        </div>
        <div class="store-dot-connector"></div>
        <div class="store-dot" id="dot-AH"    data-store="AH">
          <img src="/recourses/stores/ah.png"   alt="Albert Heijn" />
          <span class="dot-check">✓</span>
        </div>
        <div class="store-dot-connector"></div>
        <div class="store-dot" id="dot-Jumbo" data-store="Jumbo">
          <img src="/recourses/stores/jumbo.jpg" alt="Jumbo" />
          <span class="dot-check">✓</span>
        </div>
        <div class="store-dot-connector"></div>
        <div class="store-dot" id="dot-Plus"  data-store="Plus">
          <img src="/recourses/stores/plus.png"  alt="Plus" />
          <span class="dot-check">✓</span>
        </div>
      </div>
    </div>

    <div id="state-error" class="state-card hidden">
      <p id="error-msg">Er is een fout opgetreden.</p>
    </div>

    <!-- Mobile card view (shown on small screens instead of table) -->
    <div id="price-cards" class="hidden"></div>

    <div id="price-table-wrap" class="hidden">
      <table id="price-table">
        <thead>
          <tr id="store-header-row">
            <th class="type-col"></th>
            <!-- store headers injected by JS -->
          </tr>
        </thead>
        <tbody id="table-body">
          <!-- rows injected by JS -->
        </tbody>
      </table>
    </div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
